name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Supabase config
        run: |
          mkdir -p dist
          cp index.html app.js styles.css service-worker.js manifest.webmanifest icon.svg dist/
          touch dist/.nojekyll
          cat > dist/supabase-config.js <<'EOF'
          export default {
            url: "${{ secrets.PUBLIC_SUPABASE_URL }}",
            anonKey: "${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}"
          };
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
